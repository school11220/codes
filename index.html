p1: `import gensim.downloader as api

print("Loading word vectors...")
wv = api.load("word2vec-google-news-300")

def relate(a, b, c):
    results = wv.most_similar(positive=[a, c], negative=[b], topn=5)
    for word, score in results:
        print(word, score)

def sim(w1, w2):
    print(wv.similarity(w1, w2))

def nearby(word):
    for w, s in wv.most_similar(word, topn=5):
        print(w, s)

relate("king", "man", "woman")
sim("cat", "dog")
nearby("happy")`,

p2: `import gensim.downloader as api
import matplotlib.pyplot as plt
from sklearn.decomposition import PCA

wv = api.load("word2vec-google-news-300")

def show_similar(word):
    for w, score in wv.most_similar(word, topn=5):
        print(w, score)

def plot_words(words):
    coords = PCA(n_components=2).fit_transform([wv[w] for w in words])

    plt.scatter(coords[:,0], coords[:,1])
    for i, word in enumerate(words):
        plt.annotate(word,(coords[i,0],coords[i,1]))
    plt.show()

show_similar("king")
plot_words(["king","queen","prince","princess"])`,

p4: `import gensim.downloader as api
from transformers import pipeline

wv = api.load("glove-wiki-gigaword-100")
gen = pipeline("text-generation", model="distilgpt2")

def enrich(prompt, keyword):
    sims = [w for w,_ in wv.most_similar(keyword, topn=3)]
    return f"{prompt} Include related concepts such as {', '.join(sims)}."

def ask(prompt):
    return gen(prompt, max_new_tokens=100)[0]["generated_text"]

p = "Explain the responsibilities of a king."
print(ask(enrich(p,"king")))`,

p9: `import wikipediaapi
from pydantic import BaseModel

class Institution(BaseModel):
    founder: str = "N/A"
    founded: str = "N/A"
    summary: str = "N/A"

class Parser:
    def parse(self, page):
        lines = page.text.split("\\n")
        return Institution(
            founder=next((x for x in lines if "founder" in x.lower()), "N/A"),
            founded=next((x for x in lines if "founded" in x.lower() or "established" in x.lower()), "N/A"),
            summary=". ".join(page.summary.split(". ")[:4])
        )

wiki = wikipediaapi.Wikipedia(user_agent="MyApp", language="en")
page = wiki.page(input("Enter Institution Name: "))

if page.exists():
    x = Parser().parse(page)
    print("Founder:", x.founder)
    print("Founded:", x.founded)
    print("Summary:", x.summary)`,
